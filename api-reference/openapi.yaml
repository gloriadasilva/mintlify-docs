openapi: 3.0.0
info:
  title: NexStoreAPI
  version: 1.0.0
  description: >-
    # Introduction


    A secure product management API that allows you to manage your product
    listings and reach your customers. Create and manage your product listings
    while your customers can view and filter all available products.


    ## **Quick Start Guide**


    Get up and running in minutes:


    **Step 1: Create an Account.**


    Send a request to the Create User endpoint to register a new account.


    **Step 2: Authenticate.**


    Send a request to the Login endpoint to receive your access token and begin
    making authenticated requests.


    **Step 3: Create a Product.**


    Send a request to the Create Product endpoint to add your first listing.


    # API REFERENCE


    ## Overview


    **NexStore provides a simple and secure way for businesses to manage their
    product listings through a REST API. It handles everything from user
    authentication to product management, allowing vendors to create, update,
    and delete their own listings while customers can browse and filter
    available products.**


    **All protected operations require authentication via JWT, ensuring that
    only authorized users can manage their data.**


    ## **How to Get Your API Keys**


    **Step 1: Send a request to the \`create-user\` endpoint to create a
    NexStore account.**


    **Step 2: Send a request to the \`login\` endpoint to log in to your
    NexStore account.**


    **Step 3: Get your API keys in the response body.**


    > **Image attached here** 
      

    ## **How to Authenticate Admin-related Requests:**


    – Include your API Key in the Authorization header of every admin-related
    endpoint using the Bearer token format.


    > {  

    "Authorization": "Bearer
    eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2OWIzNTI1Njk5MDRiYTUwYzNmYjA4ODciLCJuYW1lIjoiR2xvcmlhIFRlanVvc2hvIiwicm9sZSI6InNlbGxlciIsImlhdCI6MTc3MzM1OTcxNSwiZXhwIjoxNzczMzBwNjE1fQ.w7eiso4ii6E3zvFDS1_XN-nIoExhCZZTusqBXvJHmB"  

    } 
      

    **– API calls made without proper authorization will result in an
    "Unauthorized" error message from the API.**


    > **Notes:** 
      
    > **Your API keys expire every fifteen minutes. However, you can refresh it
    by sending a request to the refresh token endpoint to get a new one.** 
      
    > **After 30 days, your login session will expire, which means you will no
    longer be able to refresh a token. In that case, you have to re-log in and
    get a new API key.** 
      

    # **API Status & Error Codes**


    **The NexStore API uses the standard HTTPS status codes for broad
    classification of errors.**


    | **Status Code** | **Meaning** |

    | --- | --- |

    | 200 | This indicates a successful request |

    | 201 | This indicates a product has been created or modified successfully.
    |


    ## API Error Codes


    | **Status Code** | **Meaning** | **Solution** |

    | --- | --- | --- |

    | 400 | Bad Request | Enter the correct parameters |

    | 401 | Bad Request | Enter a valid API key |

    | 403 | Authentication | You have no access to the endpoint |
servers:
  - url: https://secure-product-management-api.onrender.com
paths:
  /:
    get:
      summary: Login
      responses:
        '200':
          description: login
          headers:
            X-Powered-By:
              schema:
                type: string
              example: Express
            Set-Cookie:
              schema:
                type: string
              example: >-
                refreshToken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2OWI0YWExMTMwNjA4NzdhNzM3MjBjYmEiLCJpYXQiOjE3NzM0NDc3ODgsImV4cCI6MTc3NjAzOTc4OH0.-LEETSJy4bWAEM4J5j5TzD5kjSL9VIAjwlsHTfGZjq4;
                Max-Age=604800; Path=/; Expires=Sat, 21 Mar 2026 00:23:08 GMT;
                HttpOnly; SameSite=Strict
            Content-Length:
              schema:
                type: integer
              example: '256'
            ETag:
              schema:
                type: string
              example: W/"100-90rJiTGZRvnDDF0C/ALgCtax6ws"
            Date:
              schema:
                type: string
              example: Sat, 14 Mar 2026 00:23:08 GMT
            Connection:
              schema:
                type: string
              example: keep-alive
            Keep-Alive:
              schema:
                type: string
              example: timeout=5
      description: >-
        This endpoint allows you to log in to your NexStore account and provides
        your API Key in the response.
  /api/v1/auth/refresh:
    post:
      summary: Refresh Token
      parameters:
        - name: Authorization
          in: header
          required: false
          description: This represents your API Keys.
          deprecated: false
          schema: {}
          example: >-
            Bearer
            eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2OWI0YWExMTMwNjA4NzdhNzM3MjBjYmEiLCJuYW1lIjoiR2xvcmlhIFRlanVvc2hvIiwicm9sZSI6InNlbGxlciIsImlhdCI6MTc3MzQ0Nzc4OCwiZXhwIjoxNzczNDQ4Njg4fQ.Z14R7TjryQNT0WYIkxY9yr1kR0CTdwoET-6rxeyrc1U
      responses:
        '200':
          description: refresh-token
          headers:
            X-Powered-By:
              schema:
                type: string
              example: Express
            Content-Length:
              schema:
                type: integer
              example: '209'
            ETag:
              schema:
                type: string
              example: W/"d1-RCDQ/g52auJbK6Nws7E7HxBKFB0"
            Date:
              schema:
                type: string
              example: Sat, 14 Mar 2026 00:24:28 GMT
            Connection:
              schema:
                type: string
              example: keep-alive
            Keep-Alive:
              schema:
                type: string
              example: timeout=5
      description: This endpoint allows you to refresh your API key.
  /api/v1/product:
    post:
      summary: Create Product
      parameters:
        - name: Authorization
          in: header
          required: false
          description: |
            This represents your API key.
          deprecated: false
          schema: {}
          example: >-
            Bearer
            eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2OWFjMzc0MTM3ZmM3MGU3ZWZmYjFmNzgiLCJuYW1lIjoiZ2xhZGx5Iiwicm9sZSI6InNlbGxlciIsImlhdCI6MTc3Mjg5NDIxMCwiZXhwIjoxNzc0MTkwMjEwfQ.lPxNU2XJvU2cueUtxxdhT0Vs1mSwFZOp9abtSwsKxpU
      responses:
        '201':
          description: Create Product
          headers:
            X-Powered-By:
              schema:
                type: string
              example: Express
            Content-Length:
              schema:
                type: integer
              example: '220'
            ETag:
              schema:
                type: string
              example: W/"dc-EhPxzTI4vRnHT5Udr9vAXYWE3/o"
            Date:
              schema:
                type: string
              example: Sat, 14 Mar 2026 00:31:33 GMT
            Connection:
              schema:
                type: string
              example: keep-alive
            Keep-Alive:
              schema:
                type: string
              example: timeout=5
      description: This endpoint allows you to create a new product.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                price:
                  type: integer
                featured:
                  type: boolean
                company:
                  type: string
            example:
              name: Sudan Bed
              price: 2500
              company: Liddy
              rating: 4.5
              featured: false
  /api/v1/user/login:
    post:
      summary: Login
      responses:
        '200':
          description: login
          headers:
            X-Powered-By:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
            Content-Length:
              schema:
                type: integer
            ETag:
              schema:
                type: string
            Date:
              schema:
                type: string
            Connection:
              schema:
                type: string
            Keep-Alive:
              schema:
                type: string
      description: >-
        This endpoint allows you to log in to your NexStore account and provides
        your API Key in the response.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: integer
                confirm:
                  type: integer
  /api/v1/user:
    post:
      summary: Create User
      responses:
        '201':
          description: create-user
          headers:
            X-Powered-By:
              schema:
                type: string
            Content-Length:
              schema:
                type: integer
            ETag:
              schema:
                type: string
            Date:
              schema:
                type: string
            Connection:
              schema:
                type: string
            Keep-Alive:
              schema:
                type: string
      description: This endpoint allows you to create a NexStore account.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: integer
                confirm:
                  type: integer
  /api/v1/user/logout:
    post:
      summary: Log Out
      responses:
        '200':
          description: log-out
          headers:
            X-Powered-By:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
            Content-Length:
              schema:
                type: integer
            ETag:
              schema:
                type: string
            Date:
              schema:
                type: string
            Connection:
              schema:
                type: string
            Keep-Alive:
              schema:
                type: string
      description: This endpoint allows you to log out of your NexStore account.
  /api/v1/user/profile/{id}:
    get:
      summary: Get Seller Profile
      parameters:
        - name: Authorization
          in: header
          description: |
            This represents your API keys.
          schema:
            type: string
      responses:
        '200':
          description: Get Seller Profile
          headers:
            X-Powered-By:
              schema:
                type: string
            Content-Length:
              schema:
                type: integer
            ETag:
              schema:
                type: string
            Date:
              schema:
                type: string
            Connection:
              schema:
                type: string
            Keep-Alive:
              schema:
                type: string
      description: This endpoint allows you to retrieve a seller profile by ID.
    parameters:
      - name: id
        in: path
        required: true
        description: This represents the ID of the seller you want to retreive..
        schema:
          type: string
  /api/v1/product/edit/{id}:
    patch:
      summary: Edit Product
      parameters:
        - name: Authorization
          in: header
          required: false
          description: This represents your API key.
          deprecated: false
          schema: {}
      responses:
        '200':
          description: Edit Product
          headers:
            X-Powered-By:
              schema:
                type: string
            Content-Length:
              schema:
                type: integer
            ETag:
              schema:
                type: string
            Date:
              schema:
                type: string
            Connection:
              schema:
                type: string
            Keep-Alive:
              schema:
                type: string
      description: This endpoint allows you to edit a product by ID.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                price:
                  type: integer
                company:
                  type: string
                rating:
                  type: number
                createdAt:
                  type: string
                  format: date-time
                __v:
                  type: integer
    parameters:
      - name: id
        in: path
        required: true
        description: |
          This represents the product ID you want to edit.
        deprecated: false
        schema: {}
  /api/v1/product/delete/{id}:
    delete:
      summary: Delete  Product
      parameters:
        - name: Authorization
          in: header
          required: false
          description: |
            This represents your API key.
          deprecated: false
          schema: {}
      responses:
        '200':
          description: Delete Product
          headers:
            X-Powered-By:
              schema:
                type: string
            Content-Length:
              schema:
                type: integer
            ETag:
              schema:
                type: string
            Date:
              schema:
                type: string
            Connection:
              schema:
                type: string
            Keep-Alive:
              schema:
                type: string
      description: This endpoint allows you to delete a product by ID.
    parameters:
      - name: id
        in: path
        required: true
        description: This represents the ID of the product you want to delete.
        deprecated: false
        schema: {}
  /api/v1/products:
    get:
      summary: Get All Products
      responses:
        '200':
          description: Get All Products
          headers:
            X-Powered-By:
              schema:
                type: string
            Content-Length:
              schema:
                type: integer
            ETag:
              schema:
                type: string
            Date:
              schema:
                type: string
            Connection:
              schema:
                type: string
            Keep-Alive:
              schema:
                type: string
      description: This endpoint allows you to retrieve all available products.
  /api/v1/product/search:
    get:
      summary: Filter Product
      parameters:
        - name: findName
          in: query
          required: false
          description: This represents the product name you want to retrieve.
          deprecated: false
          schema: {}
        - name: numFilters
          in: query
          required: false
          description: >-
            This represents the product price and rating you want to retrieve.
            E.g., price <=100, rating=5
          deprecated: false
          schema: {}
        - name: findFeature
          in: query
          required: false
          description: >-
            This represents the feature status of the product you want to
            retrieve. Possible Values: true, false.
          deprecated: false
          schema: {}
        - name: fields
          in: query
          required: false
          description: >-
            This represents the product field you want to retreive. E.g., name,
            price, company, and rating.
          deprecated: false
          schema: {}
        - name: sortPrice
          in: query
          required: false
          description: >-
            This represents how you want to sort the product price. Possible
            Values: true and false.
          deprecated: false
          schema: {}
        - name: limit
          in: query
          required: false
          description: >
            This represents the number of products you want to retreive. Default
            Value: 10.
          deprecated: false
          schema: {}
      responses:
        '200':
          description: filter-product
          headers:
            X-Powered-By:
              schema:
                type: string
            Content-Length:
              schema:
                type: integer
            ETag:
              schema:
                type: string
            Date:
              schema:
                type: string
            Connection:
              schema:
                type: string
            Keep-Alive:
              schema:
                type: string
      description: >-
        This endpoint allows you to filter products by name, price, rating, and
        feature status.
  /api/v1/product/{name}:
    get:
      summary: Get Product By Name
      responses:
        '200':
          description: Get Product By Name
          headers:
            X-Powered-By:
              schema:
                type: string
            Content-Length:
              schema:
                type: integer
            ETag:
              schema:
                type: string
            Date:
              schema:
                type: string
            Connection:
              schema:
                type: string
            Keep-Alive:
              schema:
                type: string
      description: This endpoint allows you to retrieve a product by name.
    parameters:
      - name: name
        in: path
        required: true
        description: This represents the product name you want to retrieve.
        deprecated: false
        schema: {}
